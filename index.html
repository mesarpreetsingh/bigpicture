<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Seamless Stitcher</title>
    <style>
        /* --- Strict Color Palette & Font --- */
        :root {
            --bg-color: #EAEFEF;
            --soft-panel: rgba(191, 201, 209, 0.4); /* #BFC9D1 with transparency */
            --dark-text: #25343F;
            --accent-orange: #FF9B51;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--dark-text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            cursor: none; 
        }

        /* --- Refined, Smaller Custom Cursor --- */
        .custom-cursor {
            width: 8px; 
            height: 8px;
            background-color: var(--accent-orange);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease-out;
        }
        .custom-cursor.active {
            transform: scale(1.5); /* Less wild expansion */
            background-color: var(--dark-text);
        }

        /* --- Interactive Background Blobs --- */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            transition: transform 0.3s ease-out;
        }
        .blob-1 { top: 10%; left: 10%; width: 50vw; height: 50vw; background: #BFC9D1; }
        .blob-2 { bottom: 10%; right: 10%; width: 40vw; height: 40vw; background: rgba(255, 155, 81, 0.3); }

        /* --- Fluid Glass Panel (No harsh boxes) --- */
        .glass-panel {
            background: var(--soft-panel);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: clamp(20px, 5vw, 40px);
            padding: clamp(20px, 6vw, 50px);
            width: 90%;
            max-width: 650px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(37, 52, 63, 0.08);
        }

        h1 { font-size: clamp(2rem, 5vw, 3rem); margin: 0 0 10px 0; font-weight: 300; }
        p { font-size: clamp(1rem, 2.5vw, 1.2rem); opacity: 0.8; margin-bottom: 30px; }

        /* --- Interactive Drag & Drop Zone --- */
        .drop-zone {
            border: 2px dashed var(--dark-text);
            border-radius: 20px;
            padding: 40px 20px;
            transition: all 0.3s ease;
            cursor: none;
            position: relative;
            background: rgba(234, 239, 239, 0.3);
        }
        .drop-zone.dragover {
            background: rgba(255, 155, 81, 0.1);
            border-color: var(--accent-orange);
            transform: scale(1.02);
        }
        .drop-zone input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: none;
        }

        /* --- Buttons --- */
        .btn-main {
            background-color: var(--dark-text);
            color: var(--bg-color);
            border: none;
            padding: 16px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 20px;
            font-weight: 600;
        }
        .btn-main:hover {
            background-color: var(--accent-orange);
            color: var(--dark-text);
            transform: translateY(-2px);
        }

        /* --- The Pipeline Stepper --- */
        #processingUI { display: none; }
        .stepper {
            display: flex;
            justify-content: space-between;
            margin: 30px 0;
            position: relative;
        }
        .stepper::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: #BFC9D1;
            z-index: 1;
            transform: translateY(-50%);
        }
        .step {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #BFC9D1;
            color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 2;
            transition: all 0.4s ease;
        }
        .step.active {
            background: var(--accent-orange);
            box-shadow: 0 0 15px var(--accent-orange);
            transform: scale(1.2);
        }
        
        .status-text {
            font-size: 1.1rem;
            font-weight: 500;
            margin-top: 20px;
            color: var(--dark-text);
        }

        #resultContainer { display: none; animation: slideUp 0.8s ease; }
        #resultImage { max-width: 100%; border-radius: 20px; margin-top: 20px; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .custom-cursor { display: none; } /* Disable custom cursor on touch devices */
            body { cursor: auto; }
            .drop-zone input[type="file"] { cursor: pointer; }
        }
    </style>
</head>
<body>

    <div class="custom-cursor" id="cursor"></div>
    <div class="blob blob-1" id="blob1"></div>
    <div class="blob blob-2" id="blob2"></div>

    <div class="glass-panel">
        <h1>Seamless Stitcher</h1>
        <p>Drop your sequence to create the big picture.</p>
        
        <div id="uploadUI">
            <div class="drop-zone" id="dropZone">
                <span id="dropText">Drag & drop images here<br>or click to browse</span>
                <input type="file" id="imageInput" multiple accept="image/*" onchange="handleFiles()">
            </div>
            <button class="btn-main" id="startBtn" style="display:none;" onclick="startProcess()">Start Processing</button>
        </div>

        <div id="processingUI">
            <div class="stepper">
                <div class="step active" id="step1">1</div>
                <div class="step" id="step2">2</div>
                <div class="step" id="step3">3</div>
            </div>
            <div class="status-text" id="dynamicStatusArea">Connecting to cloud...</div>
        </div>

        <div id="resultContainer">
            <h2 style="color: var(--accent-orange);">Masterpiece Ready</h2>
            <img id="resultImage" alt="Stitched Result">
            <a id="downloadLink" class="btn-main" style="display: inline-block; text-decoration: none; box-sizing: border-box;">Download High-Res Image</a>
        </div>
    </div>

    <script>
        const HF_BACKEND_URL = "https://singh56-bigpicture.hf.space";
        let pollingInterval;

        // --- Session Persistence ---
        window.onload = () => {
            const savedJobId = localStorage.getItem('activeStitchJob');
            if (savedJobId) {
                document.getElementById('uploadUI').style.display = 'none';
                document.getElementById('processingUI').style.display = 'block';
                checkStatus(savedJobId);
            }
        };

        // --- Interactive Mouse Effects ---
        const cursor = document.getElementById('cursor');
        const blob1 = document.getElementById('blob1');
        const blob2 = document.getElementById('blob2');

        document.addEventListener('mousemove', e => {
            if (window.innerWidth > 768) {
                cursor.style.left = e.clientX - 4 + 'px';
                cursor.style.top = e.clientY - 4 + 'px';
                
                // Gentle parallax for background blobs to keep user entertained
                const x = e.clientX / window.innerWidth;
                const y = e.clientY / window.innerHeight;
                blob1.style.transform = `translate(${x * 50}px, ${y * 50}px)`;
                blob2.style.transform = `translate(${x * -40}px, ${y * -40}px)`;
            }
        });

        document.querySelectorAll('button, input, a, .drop-zone').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });

        // --- Drag & Drop Interactions ---
        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', (e) => { dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', (e) => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => { dropZone.classList.remove('dragover'); });

        function handleFiles() {
            const fileInput = document.getElementById('imageInput');
            const dropText = document.getElementById('dropText');
            const startBtn = document.getElementById('startBtn');
            
            if (fileInput.files.length > 0) {
                dropText.innerHTML = `<span style="color: var(--accent-orange); font-size: 1.5rem; font-weight:bold;">${fileInput.files.length}</span> images ready.`;
                startBtn.style.display = 'block';
            }
        }

        async function startProcess() {
            const fileInput = document.getElementById('imageInput');
            document.getElementById('uploadUI').style.display = 'none';
            document.getElementById('processingUI').style.display = 'block';

            const formData = new FormData();
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append("files", fileInput.files[i]);
            }

            try {
                const response = await fetch(`${HF_BACKEND_URL}/upload`, { method: 'POST', body: formData });
                const data = await response.json();
                if (data.job_id) {
                    localStorage.setItem('activeStitchJob', data.job_id);
                    checkStatus(data.job_id);
                }
            } catch (error) {
                document.getElementById('dynamicStatusArea').innerText = "Connection failed.";
            }
        }

        async function checkStatus(jobId) {
            const statusArea = document.getElementById('dynamicStatusArea');
            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            const step3 = document.getElementById('step3');

            pollingInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${HF_BACKEND_URL}/status/${jobId}`);
                    const contentType = response.headers.get("content-type");
                    
                    if (contentType && contentType.includes("image")) {
                        clearInterval(pollingInterval);
                        localStorage.removeItem('activeStitchJob');
                        
                        const blob = await response.blob();
                        const imageUrl = URL.createObjectURL(blob);
                        
                        document.getElementById('resultImage').src = imageUrl;
                        document.getElementById('downloadLink').href = imageUrl;
                        document.getElementById('downloadLink').download = "seamless_masterpiece.jpg";
                        
                        document.getElementById('processingUI').style.display = 'none';
                        document.getElementById('resultContainer').style.display = 'block';
                    } else {
                        const data = await response.json();
                        if (data.status.startsWith("failed")) {
                            clearInterval(pollingInterval);
                            localStorage.removeItem('activeStitchJob');
                            statusArea.innerHTML = `<span style="color: red;">Error: ${data.status}</span>`;
                        } else {
                            // Print the exact real data from Python
                            statusArea.innerText = data.status;

                            // Smart Pipeline Updates based on real text
                            if (data.status.includes("Loading full-resolution")) {
                                step1.classList.remove('active');
                                step2.classList.add('active'); // Moved to phase 2
                            } else if (data.status.includes("heavy stitching algorithm")) {
                                step2.classList.remove('active');
                                step3.classList.add('active'); // Moved to final phase
                            }
                        }
                    }
                } catch (error) {
                    console.error("Polling error:", error);
                }
            }, 5000);
        }
    </script>
</body>
</html>

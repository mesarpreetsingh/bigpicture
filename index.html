<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Picture | Professional Stitcher</title>
    <style>
        /* --- Strictly Applied Color Palette --- */
        :root {
            --bg-color: #EAEFEF;
            --soft-accent: #BFC9D1;
            --dark-text: #25343F;
            --vibrant-orange: #FF9B51;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            background-color: var(--bg-color);
            color: var(--dark-text);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none; 
        }

        /* --- Refined, Small Custom Cursor --- */
        .custom-cursor {
            width: 8px;
            height: 8px;
            background-color: var(--vibrant-orange);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease-out;
            mix-blend-mode: multiply;
        }
        .custom-cursor.active {
            transform: scale(2);
            background-color: var(--dark-text);
            opacity: 0.5;
        }

        /* --- Organic Background Blobs (No Boxes) --- */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
            animation: float 12s infinite ease-in-out alternate;
        }
        .blob-1 { top: -10%; left: -5%; width: 50vw; height: 50vw; background: var(--soft-accent); }
        .blob-2 { bottom: -10%; right: -5%; width: 45vw; height: 45vw; background: rgba(255, 155, 81, 0.15); animation-delay: -6s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 60px) scale(1.05); }
        }

        /* --- Desktop vs Mobile Architecture --- */
        .app-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            width: 90%;
            max-width: 1200px;
            margin: 40px auto;
            align-items: start;
        }

        @media (max-width: 900px) {
            .app-wrapper {
                grid-template-columns: 1fr; /* Stacks seamlessly on mobile */
                gap: 20px;
            }
        }

        /* --- Glassmorphism Panels --- */
        .glass-panel {
            background: rgba(191, 201, 209, 0.3); /* Transparent Soft Accent */
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(37, 52, 63, 0.05);
            transition: all 0.3s ease;
        }

        .glass-panel:hover {
            box-shadow: 0 25px 60px rgba(37, 52, 63, 0.08);
            transform: translateY(-2px);
        }

        h1 { font-weight: 300; font-size: 2.8rem; margin-top: 0; margin-bottom: 10px; line-height: 1.1; }
        p { font-size: 1.1rem; opacity: 0.8; margin-bottom: 30px; line-height: 1.5; }

        /* --- Interactive UI Elements --- */
        .file-upload-wrapper {
            position: relative;
            overflow: hidden;
            width: 100%;
            margin-bottom: 20px;
        }
        .file-upload-wrapper input[type="file"] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: none;
            height: 100%;
        }
        .btn-main {
            background-color: var(--dark-text);
            color: var(--bg-color);
            border: none;
            padding: 16px 30px;
            font-size: 1.1rem;
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            width: 100%;
            font-weight: 600;
            display: inline-block;
            text-align: center;
            box-sizing: border-box;
            cursor: none;
        }
        .btn-main:hover {
            background-color: var(--vibrant-orange);
            color: var(--dark-text);
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(255, 155, 81, 0.2);
        }

        .orange-num {
            color: var(--vibrant-orange);
            font-weight: 700;
            font-size: 1.5rem;
        }

        /* --- The Live Cloud Console (Interactive Waiting Area) --- */
        .console-window {
            background: rgba(37, 52, 63, 0.05);
            border-radius: 20px;
            padding: 20px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }
        .console-line {
            opacity: 0;
            animation: slideIn 0.3s ease forwards;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(191, 201, 209, 0.3);
        }
        .console-line:last-child {
            color: var(--vibrant-orange);
            font-weight: bold;
            border-bottom: none;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* --- Results Area --- */
        #resultContainer { display: none; text-align: center; animation: fadeIn 0.8s ease; }
        #resultImage { max-width: 100%; border-radius: 15px; box-shadow: 0 15px 40px rgba(37, 52, 63, 0.15); margin-bottom: 20px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Scrollbar Styling for Console */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--soft-accent); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--vibrant-orange); }

    </style>
</head>
<body>

    <div class="custom-cursor" id="cursor"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="app-wrapper">
        
        <div class="glass-panel" style="display: flex; flex-direction: column; justify-content: center;">
            <h1>Big Picture<br><span style="color: var(--vibrant-orange);">Stitcher</span></h1>
            <p>Upload your sequence. Our cloud engine calculates the exact geometry to blend them flawlessly.</p>
            
            <div id="uploadUI">
                <div class="file-upload-wrapper">
                    <button class="btn-main" style="background-color: var(--soft-accent); color: var(--dark-text);">Select Image Sequence</button>
                    <input type="file" id="imageInput" multiple accept="image/*" onchange="updateFileCount()">
                </div>
                
                <div id="fileCountDisplay" style="margin-bottom: 20px; display: none; font-size: 1.1rem;">
                    Ready to process <span class="orange-num" id="fileCountNum">0</span> high-res files.
                </div>
                
                <button class="btn-main" id="startBtn" onclick="startProcess()">Initialize Engine</button>
            </div>
        </div>

        <div class="glass-panel" id="actionPanel" style="min-height: 350px; display: flex; flex-direction: column; justify-content: center;">
            
            <div id="emptyState" style="text-align: center; opacity: 0.6;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--dark-text)" stroke-width="1.5" style="margin-bottom: 15px;">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                </svg>
                <p style="margin: 0;">Awaiting sequence initialization...</p>
            </div>

            <div id="processingUI" style="display: none; height: 100%;">
                <h3 style="margin-top: 0; color: var(--dark-text);">Cloud Engine Live Feed</h3>
                <div class="console-window" id="consoleWindow">
                    </div>
            </div>

            <div id="resultContainer">
                <img id="resultImage" alt="Stitched Masterpiece">
                <a id="downloadLink" class="btn-main" style="text-decoration: none;">Download Masterpiece</a>
                <button class="btn-main" style="background-color: transparent; border: 2px solid var(--soft-accent); color: var(--dark-text); margin-top: 10px;" onclick="resetApp()">Start New Sequence</button>
            </div>

        </div>
    </div>

    <script>
        const HF_BACKEND_URL = "https://singh56-bigpicture.hf.space";
        let pollingInterval;
        let lastLoggedStatus = "";

        // --- Persistent Session ---
        window.onload = () => {
            const savedJobId = localStorage.getItem('activeStitchJob');
            if (savedJobId) {
                switchToProcessingUI();
                logToConsole("Session restored. Reconnecting to cloud engine...");
                checkStatus(savedJobId);
            }
        };

        // --- Custom Cursor ---
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX - 4 + 'px';
            cursor.style.top = e.clientY - 4 + 'px';
        });
        document.querySelectorAll('button, input, a, .glass-panel').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });

        // --- UI Flow ---
        function updateFileCount() {
            const fileInput = document.getElementById('imageInput');
            if (fileInput.files.length > 0) {
                document.getElementById('fileCountNum').innerText = fileInput.files.length;
                document.getElementById('fileCountDisplay').style.display = "block";
            }
        }

        function switchToProcessingUI() {
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('resultContainer').style.display = 'none';
            document.getElementById('processingUI').style.display = 'block';
            document.getElementById('startBtn').innerText = "Processing...";
            document.getElementById('startBtn').style.opacity = "0.5";
            document.getElementById('startBtn').style.pointerEvents = "none";
        }

        function logToConsole(message) {
            // Only add a new line if the message actually changed
            if (message !== lastLoggedStatus) {
                const consoleWindow = document.getElementById('consoleWindow');
                const newLine = document.createElement('div');
                newLine.className = 'console-line';
                
                // Add timestamp
                const time = new Date().toLocaleTimeString([], {hour12: false});
                newLine.innerHTML = `<span style="color: var(--soft-accent);">[${time}]</span> ${message}`;
                
                consoleWindow.appendChild(newLine);
                consoleWindow.scrollTop = consoleWindow.scrollHeight; // Auto-scroll to bottom
                lastLoggedStatus = message;
            }
        }

        async function startProcess() {
            const fileInput = document.getElementById('imageInput');
            if (fileInput.files.length < 2) {
                alert("Please select at least 2 images.");
                return;
            }

            switchToProcessingUI();
            logToConsole("Initializing sequence upload...");

            const formData = new FormData();
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append("files", fileInput.files[i]);
            }

            try {
                const response = await fetch(`${HF_BACKEND_URL}/upload`, { method: 'POST', body: formData });
                const data = await response.json();

                if (data.job_id) {
                    logToConsole(`Job ID [${data.job_id.substring(0,8)}] assigned. Upload complete.`);
                    localStorage.setItem('activeStitchJob', data.job_id);
                    checkStatus(data.job_id);
                }
            } catch (error) {
                logToConsole("<span style='color: red;'>CRITICAL ERROR: Connection to cloud failed.</span>");
            }
        }

        async function checkStatus(jobId) {
            pollingInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${HF_BACKEND_URL}/status/${jobId}`);
                    const contentType = response.headers.get("content-type");
                    
                    if (contentType && contentType.includes("image")) {
                        // Finished!
                        clearInterval(pollingInterval);
                        localStorage.removeItem('activeStitchJob');
                        
                        logToConsole("Render complete. Fetching payload...");
                        
                        const blob = await response.blob();
                        const imageUrl = URL.createObjectURL(blob);
                        
                        document.getElementById('resultImage').src = imageUrl;
                        document.getElementById('downloadLink').href = imageUrl;
                        document.getElementById('downloadLink').download = "bigpicture_master.jpg";
                        
                        setTimeout(() => {
                            document.getElementById('processingUI').style.display = 'none';
                            document.getElementById('resultContainer').style.display = 'block';
                            
                            // Reset button
                            const btn = document.getElementById('startBtn');
                            btn.innerText = "Initialize Engine";
                            btn.style.opacity = "1";
                            btn.style.pointerEvents = "auto";
                        }, 1000); // Slight delay so they can read the final log

                    } else {
                        const data = await response.json();
                        if (data.status.startsWith("failed")) {
                            clearInterval(pollingInterval);
                            localStorage.removeItem('activeStitchJob');
                            logToConsole(`<span style='color: red;'>ERROR: ${data.status}</span>`);
                        } else {
                            logToConsole(data.status); // Push the real status from Python to the console
                        }
                    }
                } catch (error) {
                    console.error("Polling error:", error);
                }
            }, 4000);
        }

        function resetApp() {
            document.getElementById('resultContainer').style.display = 'none';
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('consoleWindow').innerHTML = ''; // Clear logs
            document.getElementById('imageInput').value = ''; // Clear files
            document.getElementById('fileCountDisplay').style.display = 'none';
            lastLoggedStatus = "";
        }
    </script>
</body>
</html>

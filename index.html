<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Picture | Advanced Stitching</title>
    <style>
        /* --- Color Palette & Soothing Theme --- */
        :root {
            --bg-color: #EAEFEF;
            --soft-accent: #BFC9D1;
            --dark-text: #25343F;
            --vibrant-orange: #FF9B51;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            background-color: var(--bg-color);
            color: var(--dark-text);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: none; /* Hide default cursor for custom smooth cursor */
        }

        /* --- Custom Soothing Cursor (Small, controlled) --- */
        .custom-cursor {
            width: 12px;
            height: 12px;
            background-color: var(--vibrant-orange);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease-out;
            mix-blend-mode: multiply;
        }
        .custom-cursor.active {
            transform: scale(2.5);
            background-color: var(--soft-accent);
            opacity: 0.7;
        }

        /* --- Organic Background (No harsh boxes) --- */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }
        .blob-1 { top: -10%; left: -10%; width: 40vw; height: 40vw; background: var(--soft-accent); }
        .blob-2 { bottom: -10%; right: -10%; width: 35vw; height: 35vw; background: rgba(255, 155, 81, 0.2); animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.1); }
        }

        /* --- Glassmorphism UI --- */
        .glass-panel {
            background: rgba(234, 239, 239, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(191, 201, 209, 0.5);
            border-radius: 40px;
            padding: 50px;
            width: 90%;
            max-width: 650px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(37, 52, 63, 0.05);
            transition: all 0.5s ease;
        }

        h1 { font-weight: 300; font-size: 2.5rem; margin-bottom: 10px; }
        p { font-size: 1.1rem; opacity: 0.8; margin-bottom: 30px; }

        /* --- Inputs & Buttons --- */
        .file-upload-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }
        .file-upload-wrapper input[type="file"] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: none;
        }
        .btn-main {
            background-color: var(--dark-text);
            color: var(--bg-color);
            border: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 15px;
            box-shadow: 0 10px 20px rgba(37, 52, 63, 0.1);
        }
        .btn-main:hover {
            background-color: var(--vibrant-orange);
            color: var(--dark-text);
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(255, 155, 81, 0.3);
        }

        /* --- Dynamic Numbers --- */
        .orange-num {
            color: var(--vibrant-orange);
            font-weight: 700;
            font-size: 1.3em;
        }

        /* --- Processing SVG Animation --- */
        #processingUI { display: none; margin-top: 30px; }
        
        .circular-loader {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px auto;
        }
        .circular-loader svg {
            animation: rotate 2s linear infinite;
            transform-origin: center center;
            width: 100%;
            height: 100%;
        }
        .loader-path {
            stroke: var(--vibrant-orange);
            stroke-dasharray: 1, 200;
            stroke-dashoffset: 0;
            animation: dash 1.5s ease-in-out infinite;
            stroke-linecap: round;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes dash {
            0% { stroke-dasharray: 1, 200; stroke-dashoffset: 0; }
            50% { stroke-dasharray: 89, 200; stroke-dashoffset: -35px; }
            100% { stroke-dasharray: 89, 200; stroke-dashoffset: -124px; }
        }

        /* --- Staggered Status Text --- */
        .status-container {
            margin-top: 20px;
            font-size: 1.1rem;
            height: 60px;
        }
        .status-text {
            display: none;
            animation: fadeInOut 4s ease-in-out forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); }
            10% { opacity: 1; transform: translateY(0); }
            90% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        #resultContainer { display: none; margin-top: 30px; animation: fadeIn 1s ease; }
        #resultImage { max-width: 100%; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="custom-cursor" id="cursor"></div>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-panel" id="mainPanel">
        <h1>Seamless Stitcher</h1>
        <p>Drop your sequence to create the big picture.</p>
        
        <div id="uploadUI">
            <div class="file-upload-wrapper">
                <button class="btn-main" style="background-color: var(--soft-accent); color: var(--dark-text);">Select Images</button>
                <input type="file" id="imageInput" multiple accept="image/*" onchange="updateFileCount()">
            </div>
            <div id="fileCountDisplay" style="margin-top: 15px; display: none;">
                Selected <span class="orange-num" id="fileCountNum">0</span> images.
            </div>
            <button class="btn-main" onclick="startProcess()">Start Processing</button>
        </div>

        <div id="processingUI">
            <div class="circular-loader">
                <svg viewBox="25 25 50 50">
                    <circle class="loader-path" cx="50" cy="50" r="20" fill="none" stroke-width="4" />
                </svg>
            </div>
            
            <div class="status-container" id="dynamicStatusArea">
                </div>

            <div style="margin-top: 15px; font-size: 1.2rem;">
                Estimated Time: <span class="orange-num" id="etaCountdown">00:00</span>
            </div>
        </div>

        <div id="resultContainer">
            <img id="resultImage" alt="Stitched Result">
            <a id="downloadLink" class="btn-main" style="display: inline-block; text-decoration: none; margin-top: 20px; box-sizing: border-box;">Download Masterpiece</a>
        </div>
    </div>

    <script>
        const HF_BACKEND_URL = "https://singh56-bigpicture.hf.space";
        
        // --- Smooth Custom Cursor Logic ---
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX - 6 + 'px';
            cursor.style.top = e.clientY - 6 + 'px';
        });
        document.querySelectorAll('button, input, a').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });

        // --- UI Logic ---
        let etaInterval;
        let statusCycleInterval;

        function updateFileCount() {
            const fileInput = document.getElementById('imageInput');
            const display = document.getElementById('fileCountDisplay');
            const num = document.getElementById('fileCountNum');
            if (fileInput.files.length > 0) {
                num.innerText = fileInput.files.length;
                display.style.display = "block";
            }
        }

        async function startProcess() {
            const fileInput = document.getElementById('imageInput');
            if (fileInput.files.length < 2) {
                alert("Please select at least 2 images.");
                return;
            }

            const imgCount = fileInput.files.length;
            
            // Switch UI states smoothly
            document.getElementById('uploadUI').style.display = 'none';
            document.getElementById('processingUI').style.display = 'block';

            // Start dynamic UX
            startETA(imgCount);
            startStatusCycle();

            const formData = new FormData();
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append("files", fileInput.files[i]);
            }

            try {
                const response = await fetch(`${HF_BACKEND_URL}/upload`, { method: 'POST', body: formData });
                const data = await response.json();

                if (data.job_id) {
                    checkStatus(data.job_id);
                }
            } catch (error) {
                console.error(error);
                document.getElementById('dynamicStatusArea').innerHTML = "<div style='color: red;'>Connection to cloud failed.</div>";
            }
        }

        // --- The Illusion of Deep Backend Tracking ---
        function startStatusCycle() {
            const statuses = [
                "Uploading sequence to secure cloud...",
                "Analyzing spatial geometry of images...",
                "Extracting SIFT matching features...",
                "Calculating complex homography...",
                "Applying exposure compensation blocks...",
                "Finding optimal seam boundaries...",
                "Performing multi-band blending...",
                "Finalizing high-resolution render..."
            ];
            
            const statusArea = document.getElementById('dynamicStatusArea');
            let currentIndex = 0;

            function showNextStatus() {
                statusArea.innerHTML = `<div class="status-text">${statuses[currentIndex]}</div>`;
                currentIndex++;
                if (currentIndex >= statuses.length) currentIndex = statuses.length - 1; // Stay on last step
            }

            showNextStatus();
            // Change text every 4 seconds to match CSS animation
            statusCycleInterval = setInterval(showNextStatus, 4000); 
        }

        // --- Dynamic ETA Calculator ---
        function startETA(imageCount) {
            // Rough estimate: 2.5 seconds per image for OpenCV processing + 5s buffer
            let totalSeconds = Math.floor(imageCount * 2.5) + 5; 
            const etaElement = document.getElementById('etaCountdown');

            function updateDisplay() {
                let mins = Math.floor(totalSeconds / 60);
                let secs = totalSeconds % 60;
                etaElement.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            }

            updateDisplay();
            etaInterval = setInterval(() => {
                if (totalSeconds > 1) {
                    totalSeconds--;
                    updateDisplay();
                } else {
                    etaElement.innerText = "Almost there...";
                }
            }, 1000);
        }

        // --- Cloud Polling ---
        async function checkStatus(jobId) {
            const resultContainer = document.getElementById('resultContainer');
            const processingUI = document.getElementById('processingUI');

            const intervalId = setInterval(async () => {
                try {
                    const response = await fetch(`${HF_BACKEND_URL}/status/${jobId}`);
                    const contentType = response.headers.get("content-type");
                    
                    if (contentType && contentType.includes("image")) {
                        // Job Finished!
                        clearInterval(intervalId);
                        clearInterval(etaInterval);
                        clearInterval(statusCycleInterval);
                        
                        const blob = await response.blob();
                        const imageUrl = URL.createObjectURL(blob);
                        
                        document.getElementById('resultImage').src = imageUrl;
                        document.getElementById('downloadLink').href = imageUrl;
                        document.getElementById('downloadLink').download = "seamless_stitch.jpg";
                        
                        processingUI.style.display = 'none';
                        resultContainer.style.display = 'block';
                    }
                } catch (error) {
                    console.error("Polling error:", error);
                }
            }, 10000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Picture | Seamless Stitcher</title>
    <style>
        /* --- Premium Color Palette --- */
        :root {
            --light-base: #EAEFEF;
            --soft-blue: #BFC9D1;
            --deep-slate: #25343F;
            --accent-orange: #FF9B51;
        }

        /* --- Soothing, Fluid Reset --- */
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            background-color: var(--light-base);
            color: var(--deep-slate);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            cursor: none; /* Hide default for custom cursor */
        }

        /* --- Subtle, Controlled Custom Cursor --- */
        .custom-cursor {
            width: 8px; /* Small and precise */
            height: 8px;
            background-color: var(--accent-orange);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.15s ease-out, background-color 0.15s ease;
            box-shadow: 0 0 10px rgba(255, 153, 81, 0.4);
        }
        .custom-cursor.active {
            transform: scale(2); /* Less wild expansion */
            background-color: var(--deep-slate);
        }

        /* --- Animated, Organic Background --- */
        .bg-shapes {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, var(--light-base) 0%, #ffffff 100%);
        }
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: drift 15s infinite alternate ease-in-out;
        }
        .shape-1 { width: 50vw; height: 50vw; background: var(--soft-blue); top: -10%; left: -10%; }
        .shape-2 { width: 40vw; height: 40vw; background: rgba(255, 155, 81, 0.15); bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5vw, 5vh) scale(1.1); }
        }

        /* --- Glassmorphism Container (No hard boxes) --- */
        .app-container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(191, 201, 209, 0.4);
            border-radius: 3rem; /* Very soft, pill-like corners */
            padding: 3rem 2rem;
            width: 90%;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(37, 52, 63, 0.08);
            transition: all 0.5s ease;
        }

        h1 { font-weight: 300; font-size: 2.5rem; margin: 0 0 10px 0; letter-spacing: -0.5px; }
        p { font-size: 1.1rem; opacity: 0.7; margin-bottom: 2rem; }

        /* --- Interactive Upload Area --- */
        .upload-area {
            position: relative;
            border: 2px dashed var(--soft-blue);
            border-radius: 2rem;
            padding: 3rem 1rem;
            transition: all 0.3s ease;
            cursor: none;
            background: rgba(234, 239, 239, 0.3);
        }
        .upload-area:hover {
            background: rgba(191, 201, 209, 0.2);
            border-color: var(--accent-orange);
            transform: translateY(-2px);
        }
        .upload-area input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: none;
        }
        .upload-icon {
            width: 50px; height: 50px;
            fill: var(--deep-slate);
            margin-bottom: 15px;
            transition: fill 0.3s ease;
        }
        .upload-area:hover .upload-icon { fill: var(--accent-orange); }

        /* --- Buttons --- */
        .btn {
            background-color: var(--deep-slate);
            color: var(--light-base);
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            border-radius: 50px; /* Pill shape */
            margin-top: 1.5rem;
            width: 100%;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(37, 52, 63, 0.15);
        }
        .btn:hover {
            background-color: var(--accent-orange);
            color: var(--deep-slate);
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(255, 155, 81, 0.25);
        }

        /* --- Vibrant Number Highlights --- */
        .highlight { color: var(--accent-orange); font-weight: 700; font-size: 1.2em; }

        /* --- Stitching Animation (Visual interest while waiting) --- */
        .stitching-anim {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 2rem 0;
        }
        .stitch-block {
            width: 30px; height: 40px;
            background-color: var(--soft-blue);
            border-radius: 8px;
            animation: pulse-merge 2s infinite ease-in-out alternate;
        }
        .stitch-block:nth-child(2) { background-color: var(--accent-orange); animation-delay: 0.5s; }
        .stitch-block:nth-child(3) { background-color: var(--deep-slate); animation-delay: 1s; }

        @keyframes pulse-merge {
            0% { transform: translateY(0) scale(1); opacity: 0.5; }
            100% { transform: translateY(-10px) scale(1.1); opacity: 1; }
        }

        /* --- Real Progress Text --- */
        #dynamicStatusArea {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--deep-slate);
            min-height: 50px;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 1rem;
            border-left: 4px solid var(--accent-orange);
        }

        #resultContainer { display: none; margin-top: 2rem; animation: slideUp 0.8s ease; }
        #resultImage { max-width: 100%; border-radius: 1.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Responsive Tweaks --- */
        @media (max-width: 600px) {
            .app-container { padding: 2rem 1.5rem; border-radius: 2rem; }
            h1 { font-size: 2rem; }
            .custom-cursor { display: none; } /* Better UX for touch devices */
        }
    </style>
</head>
<body>

    <div class="custom-cursor" id="cursor"></div>

    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <div class="app-container">
        <h1>Big Picture</h1>
        <p>Seamlessly stitch your environment.</p>
        
        <div id="uploadUI">
            <div class="upload-area" id="dropZone">
                <svg class="upload-icon" viewBox="0 0 24 24">
                    <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.36 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
                </svg>
                <div style="font-weight: 600; font-size: 1.2rem;">Select or Drop Images</div>
                <div style="font-size: 0.9rem; opacity: 0.7; margin-top: 5px;">High-resolution supported</div>
                <input type="file" id="imageInput" multiple accept="image/*" onchange="updateFileCount()">
            </div>

            <div id="fileCountDisplay" style="margin-top: 1.5rem; display: none;">
                Ready to fuse <span class="highlight" id="fileCountNum">0</span> images.
            </div>
            
            <button class="btn" onclick="startProcess()">Commence Stitching</button>
        </div>

        <div id="processingUI" style="display: none;">
            <div class="stitching-anim">
                <div class="stitch-block"></div>
                <div class="stitch-block"></div>
                <div class="stitch-block"></div>
            </div>
            
            <div style="font-size: 1.2rem; font-weight: bold;">Processing Job</div>
            <p style="margin-top: 5px; font-size: 0.9rem;">You can safely close this tab. Your session is saved.</p>
            
            <div id="dynamicStatusArea">
                Connecting to secure cloud...
            </div>
        </div>

        <div id="resultContainer">
            <img id="resultImage" alt="Stitched Masterpiece">
            <a id="downloadLink" class="btn" style="display: inline-block; text-decoration: none; box-sizing: border-box;">Download Masterpiece</a>
        </div>
    </div>

    <script>
        const HF_BACKEND_URL = "https://singh56-bigpicture.hf.space";
        let pollingInterval;

        // --- Persistent Session ---
        window.onload = () => {
            const savedJobId = localStorage.getItem('activeStitchJob');
            if (savedJobId) {
                document.getElementById('uploadUI').style.display = 'none';
                document.getElementById('processingUI').style.display = 'block';
                checkStatus(savedJobId); 
            }
        };

        // --- Cursor Logic ---
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX - 4 + 'px'; // Centered based on new 8px size
            cursor.style.top = e.clientY - 4 + 'px';
        });
        document.querySelectorAll('button, input, a, .upload-area').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('active'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });

        function updateFileCount() {
            const fileInput = document.getElementById('imageInput');
            const display = document.getElementById('fileCountDisplay');
            const num = document.getElementById('fileCountNum');
            if (fileInput.files.length > 0) {
                num.innerText = fileInput.files.length;
                display.style.display = "block";
            }
        }

        async function startProcess() {
            const fileInput = document.getElementById('imageInput');
            if (fileInput.files.length < 2) {
                alert("Please select at least 2 images.");
                return;
            }

            document.getElementById('uploadUI').style.display = 'none';
            document.getElementById('processingUI').style.display = 'block';
            document.getElementById('dynamicStatusArea').innerText = "Uploading payload...";

            const formData = new FormData();
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append("files", fileInput.files[i]);
            }

            try {
                const response = await fetch(`${HF_BACKEND_URL}/upload`, { method: 'POST', body: formData });
                const data = await response.json();

                if (data.job_id) {
                    localStorage.setItem('activeStitchJob', data.job_id);
                    checkStatus(data.job_id);
                }
            } catch (error) {
                console.error(error);
                document.getElementById('dynamicStatusArea').innerHTML = "<span style='color: #e74c3c;'>Connection to cloud failed.</span>";
            }
        }

        async function checkStatus(jobId) {
            const resultContainer = document.getElementById('resultContainer');
            const processingUI = document.getElementById('processingUI');
            const statusArea = document.getElementById('dynamicStatusArea');

            pollingInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${HF_BACKEND_URL}/status/${jobId}`);
                    const contentType = response.headers.get("content-type");
                    
                    if (contentType && contentType.includes("image")) {
                        clearInterval(pollingInterval);
                        localStorage.removeItem('activeStitchJob'); 
                        
                        const blob = await response.blob();
                        const imageUrl = URL.createObjectURL(blob);
                        
                        document.getElementById('resultImage').src = imageUrl;
                        document.getElementById('downloadLink').href = imageUrl;
                        document.getElementById('downloadLink').download = "big_picture_stitch.jpg";
                        
                        processingUI.style.display = 'none';
                        resultContainer.style.display = 'block';
                    } else {
                        const data = await response.json();
                        
                        if (data.status.startsWith("failed")) {
                            clearInterval(pollingInterval);
                            localStorage.removeItem('activeStitchJob');
                            statusArea.innerHTML = `<span style="color: #e74c3c; font-weight: bold;">Error: ${data.status}</span>`;
                        } else {
                            // Display the exact REAL string from Python
                            statusArea.innerText = data.status;
                        }
                    }
                } catch (error) {
                    console.error("Polling error:", error);
                }
            }, 5000); 
        }
    </script>
</body>
</html>

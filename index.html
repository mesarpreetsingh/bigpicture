<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Picture Stitcher</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #EAEFEF;
            color: #25343F;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #BFC9D1;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(37, 52, 63, 0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
        }
        h1 {
            margin-top: 0;
            color: #25343F;
        }
        input[type="file"] {
            margin: 20px 0;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #FF9B51;
            color: #25343F;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            width: 100%;
        }
        button:hover {
            transform: scale(1.02);
            background-color: #e88c49;
        }
        #statusText {
            margin-top: 20px;
            font-weight: 500;
            font-size: 16px;
        }
        #resultContainer {
            margin-top: 30px;
            display: none;
        }
        #resultImage {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .download-btn {
            display: inline-block;
            margin-top: 15px;
            background-color: #25343F;
            color: #EAEFEF;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Big Picture Stitcher</h1>
        <p>Upload your sequence of images to create a seamless panorama.</p>
        
        <input type="file" id="imageInput" multiple accept="image/*">
        <button onclick="uploadImages()">Stitch Images</button>
        
        <div id="statusText"></div>

        <div id="resultContainer">
            <img id="resultImage" alt="Stitched Result">
            <br>
            <a id="downloadLink" class="download-btn">Download Final Image</a>
        </div>
    </div>

    <script>
        // Make sure this matches your exact Hugging Face space URL
        const HF_BACKEND_URL = "https://singh56-bigpicture.hf.space";

        async function uploadImages() {
            const fileInput = document.getElementById('imageInput');
            const statusText = document.getElementById('statusText');
            const resultContainer = document.getElementById('resultContainer');
            
            if (fileInput.files.length < 2) {
                alert("Please select at least 2 images to stitch.");
                return;
            }

            // Reset UI
            resultContainer.style.display = 'none';
            statusText.innerText = "Uploading your images to the cloud... ☁️";
            statusText.style.color = "#25343F";

            const formData = new FormData();
            for (let i = 0; i < fileInput.files.length; i++) {
                formData.append("files", fileInput.files[i]);
            }

            try {
                // Step 1: Drop off the images and get a receipt (Job ID)
                const response = await fetch(`${HF_BACKEND_URL}/upload`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();

                if (data.job_id) {
                    statusText.innerText = "Processing in the background... This may take a few minutes. ⏱️";
                    // Step 2: Start checking back every 10 seconds
                    checkStatus(data.job_id);
                } else {
                    statusText.innerText = "Error starting the job.";
                }
            } catch (error) {
                console.error(error);
                statusText.innerText = "Failed to connect to the backend server.";
            }
        }

        async function checkStatus(jobId) {
            const statusText = document.getElementById('statusText');
            const resultContainer = document.getElementById('resultContainer');
            const resultImage = document.getElementById('resultImage');
            const downloadLink = document.getElementById('downloadLink');

            // Ping the server every 10 seconds (10000 ms)
            const intervalId = setInterval(async () => {
                try {
                    const response = await fetch(`${HF_BACKEND_URL}/status/${jobId}`);
                    
                    // If the backend sends an image file back, it's done!
                    const contentType = response.headers.get("content-type");
                    if (contentType && contentType.includes("image")) {
                        clearInterval(intervalId); // Stop checking
                        statusText.innerText = "Stitching Complete! 🎉";
                        statusText.style.color = "#FF9B51";
                        
                        // Convert the image data into a displayable format
                        const blob = await response.blob();
                        const imageUrl = URL.createObjectURL(blob);
                        
                        resultImage.src = imageUrl;
                        downloadLink.href = imageUrl;
                        downloadLink.download = "seamless_stitch.jpg";
                        resultContainer.style.display = 'block';
                    } else {
                        // Otherwise, it's still working or it failed
                        const data = await response.json();
                        if (data.status.startsWith("failed")) {
                            clearInterval(intervalId);
                            statusText.innerText = "Error: " + data.status;
                            statusText.style.color = "red";
                        }
                    }
                } catch (error) {
                    console.error("Polling error:", error);
                }
            }, 10000);
        }
    </script>
</body>
</html>
